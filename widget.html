<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JARVIS</title>
  <!-- Three.js r128 — tested with PyQt5's Chromium, no ES2021+ syntax -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: transparent !important;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e0f7fa;
    }

    #globe-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
    }

    /* ── Bottom UI panel ──────────────────────── */
    #ui {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      width: 88%;
      max-width: 370px;
      z-index: 10;
    }

    #response {
      background: rgba(2, 8, 30, 0.75);
      backdrop-filter: blur(12px);
      border-left: 3px solid #00f2ff;
      border-radius: 0 10px 10px 0;
      padding: 13px 16px;
      margin-bottom: 10px;
      font-size: 13.5px;
      line-height: 1.55;
      box-shadow: 0 0 24px rgba(0, 242, 255, 0.12);
      cursor: pointer;
      transition: border-color 0.3s, box-shadow 0.3s;
      min-height: 46px;
      word-break: break-word;
    }
    #response:hover { box-shadow: 0 0 30px rgba(0,242,255,0.22); }
    #response.thinking { border-left-color: #ffaa00; box-shadow: 0 0 20px rgba(255,170,0,0.15); }
    #response.listening { border-left-color: #00ff88; box-shadow: 0 0 20px rgba(0,255,136,0.2); }
    #response.wake { border-left-color: #ff0066; box-shadow: 0 0 28px rgba(255,0,102,0.3); }

    .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 7px;
      vertical-align: middle;
      animation: blink 1.1s infinite;
    }
    .dot-cyan   { background: #00f2ff; }
    .dot-orange { background: #ffaa00; }
    .dot-green  { background: #00ff88; }
    .dot-pink   { background: #ff0066; }

    @keyframes blink {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.4; transform: scale(1.5); }
    }

    /* ── Input row ────────────────────────────── */
    #input-row {
      display: none;
      gap: 7px;
      margin-bottom: 8px;
    }
    #cmd-input {
      flex: 1;
      background: rgba(2, 8, 30, 0.75);
      border: 1px solid rgba(0,242,255,0.45);
      border-radius: 22px;
      padding: 9px 14px;
      color: #00f2ff;
      font-size: 12.5px;
      outline: none;
      letter-spacing: 0.5px;
    }
    #cmd-input::placeholder { color: rgba(0,242,255,0.35); }
    #cmd-input:focus { border-color: #00f2ff; box-shadow: 0 0 10px rgba(0,242,255,0.2); }

    #send-btn {
      background: #00f2ff;
      color: #020820;
      border: none;
      border-radius: 22px;
      padding: 9px 15px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    #send-btn:hover   { background: #fff; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Settings Panel ───────────────────────── */
    #settings-btn {
      position: fixed;
      top: 15px;
      left: 15px;
      width: 28px;
      height: 28px;
      background: rgba(0,242,255,0.1);
      border: 1px solid rgba(0,242,255,0.3);
      border-radius: 50%;
      z-index: 100;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #00f2ff;
      transition: all 0.3s;
    }
    #settings-btn:hover { background: rgba(0,242,255,0.25); transform: rotate(45deg); }

    #settings-panel {
      position: fixed;
      top: 0; left: -260px;
      width: 250px; height: 100%;
      background: rgba(2, 8, 30, 0.85);
      backdrop-filter: blur(25px);
      z-index: 99;
      padding: 60px 25px;
      transition: left 0.4s cubic-bezier(0.19, 1, 0.22, 1);
      border-right: 1px solid rgba(0,242,255,0.15);
      box-shadow: 10px 0 30px rgba(0,0,0,0.5);
    }
    #settings-panel.open { left: 0; }
    #settings-panel h2 {
      font-size: 14px;
      letter-spacing: 3px;
      font-weight: 400;
      color: #00f2ff;
      margin-bottom: 25px;
      text-transform: uppercase;
    }

    .setting-row {
      margin-bottom: 25px;
    }
    .setting-label {
      font-size: 10px;
      color: rgba(0,242,255,0.6);
      letter-spacing: 1.5px;
      margin-bottom: 10px;
      display: block;
    }

    /* Mode Toggle Switch */
    .mode-toggle {
      display: flex;
      background: rgba(0,242,255,0.05);
      border: 1px solid rgba(0,242,255,0.2);
      border-radius: 20px;
      overflow: hidden;
    }
    .mode-opt {
      flex: 1;
      padding: 8px;
      text-align: center;
      font-size: 10px;
      font-weight: bold;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background 0.3s, color 0.3s;
      color: rgba(0,242,255,0.4);
    }
    .mode-opt.active {
      background: #00f2ff;
      color: #020820;
    }
  </style>
</head>
<body>
  <canvas id="globe-canvas"></canvas>

  <div id="settings-btn">⚙</div>
  <div id="settings-panel">
    <h2>Settings</h2>
    <div class="setting-row">
      <span class="setting-label">Interaction Mode</span>
      <div class="mode-toggle">
        <div class="mode-opt" id="mode-text" onclick="setInteractionMode('text')">TEXT</div>
        <div class="mode-opt active" id="mode-speech" onclick="setInteractionMode('speech')">SPEECH</div>
      </div>
    </div>
  </div>

  <div id="ui">
    <div id="input-row">
      <input id="cmd-input" type="text" placeholder="TRANSMIT COMMAND..." autocomplete="off" spellcheck="false">
      <button id="send-btn">SEND</button>
    </div>
    <div id="response">Systems Online. Ready to assist, Sir.</div>
    <div id="status">Click response to type · Say 'Hey Jarvis' to talk</div>
  </div>

  <script>
    // ══════════════════════════════════════════════════════
    // CONFIG
    // ══════════════════════════════════════════════════════
    var API = 'http://localhost:8000';
    var busy = false;
    var inputVisible = false;

    var responseEl = document.getElementById('response');
    var inputRow   = document.getElementById('input-row');
    var cmdInput   = document.getElementById('cmd-input');
    var sendBtn    = document.getElementById('send-btn');
    var statusEl   = document.getElementById('status');

    // ══════════════════════════════════════════════════════
    // GLOBE  (Three.js r128 — no modern JS)
    // ══════════════════════════════════════════════════════
    var canvas   = document.getElementById('globe-canvas');
    var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 0);

    var scene  = new THREE.Scene();
    var camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
    camera.position.z = 4;

    // Dot texture
    var dc   = document.createElement('canvas');
    dc.width = dc.height = 64;
    var dctx = dc.getContext('2d');
    dctx.beginPath();
    dctx.arc(32, 32, 30, 0, Math.PI * 2);
    dctx.fillStyle = '#fff';
    dctx.fill();
    var dotTex = new THREE.CanvasTexture(dc);

    var globeGroup = new THREE.Group();
    scene.add(globeGroup);

    // Wireframe
    globeGroup.add(new THREE.LineSegments(
      new THREE.EdgesGeometry(new THREE.SphereGeometry(1, 48, 48)),
      new THREE.LineBasicMaterial({ color: 0x00f2ff, transparent: true, opacity: 0.18 })
    ));

    // Surface dots
    var dN = 2500;
    var dPos = new Float32Array(dN * 3);
    for (var i = 0; i < dN; i++) {
      var phi = Math.acos(-1 + 2 * Math.random());
      var th  = Math.random() * Math.PI * 2;
      dPos[i*3]   = Math.sin(phi) * Math.cos(th);
      dPos[i*3+1] = Math.cos(phi);
      dPos[i*3+2] = Math.sin(phi) * Math.sin(th);
    }
    var dGeo = new THREE.BufferGeometry();
    dGeo.setAttribute('position', new THREE.BufferAttribute(dPos, 3));
    globeGroup.add(new THREE.Points(dGeo, new THREE.PointsMaterial({
      color: 0x00f2ff, size: 0.022, map: dotTex,
      alphaTest: 0.5, transparent: true, opacity: 0.65, sizeAttenuation: true
    })));

    // Arc particles
    var aN = 120;
    var arcData = [];
    for (var j = 0; j < aN; j++) {
      arcData.push({
        p1: Math.acos(-1 + 2 * Math.random()), t1: Math.random() * Math.PI * 2,
        p2: Math.acos(-1 + 2 * Math.random()), t2: Math.random() * Math.PI * 2,
        prog: Math.random(),
        speed: 0.003 + Math.random() * 0.004,
        h: 0.2 + Math.random() * 0.4
      });
    }
    var aPos = new Float32Array(aN * 3);
    var aGeo = new THREE.BufferGeometry();
    aGeo.setAttribute('position', new THREE.BufferAttribute(aPos, 3));
    globeGroup.add(new THREE.Points(aGeo, new THREE.PointsMaterial({
      color: 0x00f2ff, size: 0.04, map: dotTex,
      alphaTest: 0.5, transparent: true, opacity: 0.9, sizeAttenuation: true
    })));

    // Glow shell
    globeGroup.add(new THREE.Mesh(
      new THREE.SphereGeometry(1.1, 32, 32),
      new THREE.MeshBasicMaterial({ color: 0x00f2ff, transparent: true, opacity: 0.04, side: THREE.BackSide })
    ));

    function arcPos(p1, t1, p2, t2, h, p) {
      var x1 = Math.sin(p1)*Math.cos(t1), y1 = Math.cos(p1), z1 = Math.sin(p1)*Math.sin(t1);
      var x2 = Math.sin(p2)*Math.cos(t2), y2 = Math.cos(p2), z2 = Math.sin(p2)*Math.sin(t2);
      var mx = (x1+x2)/2*(1+h), my = (y1+y2)/2*(1+h), mz = (z1+z2)/2*(1+h);
      var ax, ay, az;
      if (p < 0.5) {
        ax = x1+(mx-x1)*p*2; ay = y1+(my-y1)*p*2; az = z1+(mz-z1)*p*2;
      } else {
        ax = mx+(x2-mx)*(p*2-1); ay = my+(y2-my)*(p*2-1); az = mz+(z2-mz)*(p*2-1);
      }
      var l = Math.sqrt(ax*ax+ay*ay+az*az) || 1;
      return [ax/l, ay/l, az/l];
    }

    // Drag
    var rotX=0, rotY=0, velX=0, velY=0, dragging=false, lastX=0, lastY=0;
    canvas.addEventListener('mousedown', function(e) { dragging=true; lastX=e.clientX; lastY=e.clientY; velX=velY=0; });
    window.addEventListener('mousemove', function(e) {
      if (!dragging) return;
      velX = (e.clientX-lastX)*0.005; velY = (e.clientY-lastY)*0.005;
      rotY += velX; rotX += velY;
      lastX = e.clientX; lastY = e.clientY;
    });
    window.addEventListener('mouseup', function() { dragging = false; });
    canvas.addEventListener('wheel', function(e) {
      e.preventDefault();
      camera.position.z = Math.max(2.5, Math.min(8, camera.position.z + e.deltaY * 0.005));
    }, { passive: false });

    function resize() {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    }
    window.addEventListener('resize', resize);
    resize();

    (function loop() {
      requestAnimationFrame(loop);
      if (!dragging) { velX *= 0.95; velY *= 0.95; rotY += velX + 0.002; rotX += velY; }
      rotX = Math.max(-0.8, Math.min(0.8, rotX));
      globeGroup.rotation.set(rotX, rotY, 0);
      for (var k = 0; k < arcData.length; k++) {
        var a = arcData[k];
        a.prog += a.speed;
        if (a.prog > 1) a.prog = 0;
        var r = arcPos(a.p1, a.t1, a.p2, a.t2, a.h, a.prog);
        aPos[k*3] = r[0]; aPos[k*3+1] = r[1]; aPos[k*3+2] = r[2];
      }
      aGeo.attributes.position.needsUpdate = true;
      renderer.render(scene, camera);
    })();

    // ══════════════════════════════════════════════════════
    // UI LOGIC
    // ══════════════════════════════════════════════════════
    function setResponse(text, state) {
      state = state || 'normal';
      responseEl.className = state;
      var dots = {
        thinking:  '<span class="dot dot-orange"></span>',
        listening: '<span class="dot dot-green"></span>',
        wake:      '<span class="dot dot-pink"></span>',
        normal:    ''
      };
      responseEl.innerHTML = (dots[state] || '') + text;
    }

    function toggleInput() {
      if (busy || currentMode === 'speech') return; // Strict: No typing in speech mode
      inputVisible = !inputVisible;
      inputRow.style.display = inputVisible ? 'flex' : 'none';
      if (inputVisible) { setTimeout(function() { cmdInput.focus(); }, 50); }
    }

    responseEl.addEventListener('click', toggleInput);
    cmdInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') sendCommand(); });
    sendBtn.addEventListener('click', sendCommand);

    function sendCommand() {
      var text = cmdInput.value.trim();
      if (!text || busy) return;
      cmdInput.value = '';
      busy = true;
      sendBtn.disabled = true;
      setResponse('Analyzing...', 'thinking');
      statusEl.textContent = 'PROCESSING...';

      fetch(API + '/command', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ command: text })
      })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        setResponse(data.response || 'Done.', 'normal');
        updateStatusText();
        busy = false;
        sendBtn.disabled = false;
      })
      .catch(function() {
        setResponse('Connection error. Is the server running?', 'normal');
        statusEl.textContent = 'ERROR \u2014 CHECK SERVER';
        busy = false;
        sendBtn.disabled = false;
      });
    }

    // ══════════════════════════════════════════════════════
    // MODE & SETTINGS LOGIC
    // ══════════════════════════════════════════════════════
    var currentMode = 'speech';
    var settingsBtn = document.getElementById('settings-btn');
    var settingsPanel = document.getElementById('settings-panel');

    settingsBtn.addEventListener('click', function() {
      settingsPanel.classList.toggle('open');
    });

    function updateStatusText() {
        if (busy) return;
        if (currentMode === 'speech') {
            statusEl.textContent = 'Click response to type \xb7 Say \u2018Hey Jarvis\u2019 to talk';
        } else {
            statusEl.textContent = 'Text Interaction Active \xb7 Mic Disabled';
        }
    }

    function setInteractionMode(mode) {
      if (mode === currentMode) return;
      
      fetch(API + '/settings/mode', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mode: mode })
      })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        currentMode = data.mode;
        document.getElementById('mode-text').className = 'mode-opt' + (currentMode === 'text' ? ' active' : '');
        document.getElementById('mode-speech').className = 'mode-opt' + (currentMode === 'speech' ? ' active' : '');
        updateStatusText();
        if (currentMode === 'text') {
            setResponse('Interaction Mode: TEXT. Microphone deactivated.', 'normal');
        } else {
            setResponse('Interaction Mode: SPEECH. Always listening for "Jarvis".', 'normal');
        }
      });
    }

    // Sync mode from server on load
    fetch(API + '/settings/mode')
      .then(function(r) { return r.json(); })
      .then(function(d) {
        currentMode = d.mode;
        document.getElementById('mode-text').className = 'mode-opt' + (currentMode === 'text' ? ' active' : '');
        document.getElementById('mode-speech').className = 'mode-opt' + (currentMode === 'speech' ? ' active' : '');
        updateStatusText();
      });

    // ══════════════════════════════════════════════════════
    // WAKE-WORD SSE
    // ══════════════════════════════════════════════════════
    function connectSSE() {
      var es = new EventSource(API + '/wake-stream');
      es.onmessage = function(e) {
        if (e.data === 'wake') {
          if (currentMode === 'text') return; // Strict: Ignore voice in text mode
          
          setResponse('WAKE WORD DETECTED \u2014 Listening...', 'wake');
          statusEl.textContent = '\ud83c\udfa4 LISTENING FOR COMMAND...';
          setTimeout(function() {
            if (!busy) {
              setResponse('Ready to assist, Sir.', 'normal');
              updateStatusText();
            }
          }, 5000);
        } else if (e.data.startsWith('mode:')) {
            var newMode = e.data.split(':')[1];
            applyModeChange(newMode);
        }
      };
      es.onerror = function() {
        setTimeout(connectSSE, 5000);
      };
    }
    
    function applyModeChange(mode) {
        currentMode = mode;
        var t = document.getElementById('mode-text');
        var s = document.getElementById('mode-speech');
        if (t) t.className = 'mode-opt' + (currentMode === 'text' ? ' active' : '');
        if (s) s.className = 'mode-opt' + (currentMode === 'speech' ? ' active' : '');
        
        updateStatusText();
        
        // Auto-close input if switching away from text
        if (currentMode === 'speech') {
            inputVisible = false;
            inputRow.style.display = 'none';
        }
    }
    connectSSE();

    // ══════════════════════════════════════════════════════
    // STATS POLLING
    // ══════════════════════════════════════════════════════
    function pollStats() {
      fetch(API + '/stats')
        .then(function(r) { return r.json(); })
        .then(function(d) {
          if (busy) return;
          var s   = d.stats || '';
          var cpu = (s.match(/CPU Usage: ([\d.]+)/) || ['', '?'])[1];
          var ram = (s.match(/RAM Usage: ([\d.]+)/) || ['', '?'])[1];
          statusEl.textContent = 'CPU: ' + cpu + '% \xb7 RAM: ' + ram + '% \xb7 Click to type';
        })
        .catch(function() {});
    }
    pollStats();
    setInterval(pollStats, 10000);
  </script>
</body>
</html>
